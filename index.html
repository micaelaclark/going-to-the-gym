<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Micaela Goes to the Gym</title>
  <link rel="icon" href="/static/icon.svg">
  <link rel="apple-touch-icon" href="/static/icon.svg">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1a237e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Gym 💪">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>

  <header>
    <h1>Micaela Goes to the Gym 🏃‍♀️</h1>
  </header>

  <nav class="page-tabs">
    <button class="page-tab active" data-page="training" onclick="showPage('training')">Training</button>
    <button class="page-tab" data-page="cycle" onclick="showPage('cycle')">Cycle</button>
    <button class="page-tab" data-page="habits" onclick="showPage('habits')">Habits</button>
  </nav>

  <div id="training-page" class="page-content">
    <div id="insights" class="insights-panel hidden">
      <div class="insights-panel-title">Training Insights</div>

      <div id="insights-focus" class="insights-section hidden">
        <div class="insights-section-title">📍 Focus Here <span class="insights-hint">— not hit in 3+ days</span></div>
        <div class="insights-pills"></div>
      </div>

      <div id="insights-recovering" class="insights-section hidden">
        <div class="insights-section-title">⏳ Recovering <span class="insights-hint">— give it rest</span></div>
        <div class="insights-pills"></div>
      </div>

      <div id="insights-ready" class="insights-section hidden">
        <div class="insights-section-title">✨ Recovered &amp; Ready</div>
        <div class="insights-pills"></div>
      </div>
    </div>

    <div class="filter-bar">
      <input type="text" id="exercise-search" placeholder="Search exercises…" oninput="renderStrengthBubbles()">
      <div class="body-filter-btns">
        <button class="filter-btn active" data-filter="all" onclick="setBodyFilter('all')">All</button>
        <button class="filter-btn" data-filter="upper" onclick="setBodyFilter('upper')">Upper Body</button>
        <button class="filter-btn" data-filter="lower" onclick="setBodyFilter('lower')">Lower Body</button>
      </div>
    </div>

    <div id="strength-bubbles" class="bubble-grid">
      <p class="empty-state">No workouts yet.</p>
    </div>

    <div id="strength-chart-panel" class="chart-panel hidden">
      <div class="chart-panel-header">
        <span id="chart-panel-title"></span>
        <button class="close-btn" onclick="closeChart()">✕</button>
      </div>
      <div id="running-chart-controls" class="running-controls hidden">
        <div class="run-ctrl-group">
          <button class="run-ctrl-btn active" data-days="all" onclick="setRunningDays('all')">All</button>
          <button class="run-ctrl-btn" data-days="30" onclick="setRunningDays(30)">30d</button>
          <button class="run-ctrl-btn" data-days="7" onclick="setRunningDays(7)">7d</button>
        </div>
        <div class="run-ctrl-group">
          <button class="run-ctrl-btn active" data-metric="both" onclick="setRunningMetric('both')">Both</button>
          <button class="run-ctrl-btn" data-metric="distance" onclick="setRunningMetric('distance')">Distance</button>
          <button class="run-ctrl-btn" data-metric="speed" onclick="setRunningMetric('speed')">Speed</button>
        </div>
      </div>
      <canvas id="strength-chart"></canvas>
    </div>
  </div>

  <div id="cycle-page" class="page-content hidden">
    <div id="cycle-phase-banner" class="cycle-phase-banner card"></div>

    <div id="cycle-food-card" class="card hidden">
      <div class="food-rec-label">Today's Nutrition Focus</div>
      <div class="food-rec-name"></div>
      <div class="food-rec-why"></div>
    </div>

    <div class="card cycle-calendar">
      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="prevCalMonth()">&#8249;</button>
        <span id="cal-month-label" class="cal-month-label"></span>
        <button class="cal-nav-btn" onclick="nextCalMonth()">&#8250;</button>
      </div>
      <div id="cal-grid" class="cal-grid"></div>
    </div>

    <div id="cycle-length-panel" class="card hidden">
      <div class="cycle-length-header">Cycle Length History</div>
      <canvas id="cycle-length-chart"></canvas>
    </div>

    <div class="cycle-footer">
      <div id="cycle-legend" class="cycle-legend"></div>
      <button id="cycle-log-btn" class="cycle-log-btn" onclick="logPeriod()">🩸 Log Period Start Today</button>
    </div>
  </div>

  <div id="habits-page" class="page-content hidden">
    <div class="card habit-card" id="no-drinking-card">
      <div class="habit-label">Days Without Drinking</div>
      <div class="habit-count" id="no-drinking-count">1</div>
      <div class="habit-goal-dots" id="no-drinking-dots"></div>
      <div class="habit-goal-label" id="no-drinking-goal-label"></div>
      <button class="habit-add-btn" onclick="addNoDrinkingDay()">+ Add a Day</button>
      <div class="habit-savings" id="no-drinking-savings">
        <div class="habit-savings-label">You saved</div>
        <div class="habit-savings-amount" id="no-drinking-savings-amount">$0</div>
        <div class="habit-savings-note">based on $380/mo · ~$12.67/day</div>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
