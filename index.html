<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Micaela Goes to the Gym</title>
  <link rel="icon" href="/static/icon.svg">
  <link rel="apple-touch-icon" href="/static/icon.svg">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#f06292">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Gym 💪">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>

  <header>
    <h1>Micaela Goes to the Gym 🏃‍♀️</h1>
  </header>

  <div class="tabs">
    <button class="tab active" data-tab="strength">Strength</button>
    <button class="tab" data-tab="running">Running</button>
  </div>

  <!-- Strength Tab -->
  <div id="strength-tab" class="tab-content">
    <div id="insights" class="insights-panel hidden">
      <div class="insights-panel-title">Training Insights</div>

      <div id="insights-focus" class="insights-section hidden">
        <div class="insights-section-title">📍 Focus Here <span class="insights-hint">— not hit in 3+ days</span></div>
        <div class="insights-pills"></div>
      </div>

      <div id="insights-recovering" class="insights-section hidden">
        <div class="insights-section-title">⏳ Recovering <span class="insights-hint">— give it rest</span></div>
        <div class="insights-pills"></div>
      </div>

      <div id="insights-ready" class="insights-section hidden">
        <div class="insights-section-title">✨ Recovered & Ready</div>
        <div class="insights-pills"></div>
      </div>
    </div>

    <div id="strength-bubbles" class="bubble-grid">
      <p class="empty-state">No workouts yet.</p>
    </div>

    <div id="strength-chart-panel" class="chart-panel hidden">
      <div class="chart-panel-header">
        <span id="chart-panel-title"></span>
        <button class="close-btn" onclick="closeChart()">✕</button>
      </div>
      <canvas id="strength-chart"></canvas>
    </div>
  </div>

  <!-- Running Tab -->
  <div id="running-tab" class="tab-content hidden">
    <div class="card">
      <h2>Progress</h2>
      <div class="chart-wrap">
        <canvas id="running-chart"></canvas>
        <p id="running-empty" class="empty-chart hidden">Log some runs to see your progress chart.</p>
      </div>
    </div>

    <div class="card">
      <h2>History</h2>
      <table id="running-table">
        <thead>
          <tr>
            <th>Date</th><th>Distance (mi)</th><th>Speed (mph)</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>


<div id="daily-quote" class="daily-quote"></div>

  <script src="/static/app.js"></script>
</body>
</html>
